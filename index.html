<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliment Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .compliment-box {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            border-radius: 15px;
            border-left: 5px solid #764ba2;
        }

        #compliment {
            font-size: 1.4rem;
            color: #444;
            line-height: 1.6;
            font-style: italic;
        }

        button {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .sparkle {
            animation: sparkle 0.5s ease-in-out;
        }

        @keyframes sparkle {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">✨</div>
        <h1>Need a Pick-Me-Up?</h1>
        <div class="compliment-box">
            <p id="compliment"></p>
        </div>
        <button onclick="showCompliment()">Give Me a Compliment! 💜</button>
    </div>

    <script>
        const compliments = [
            "You're absolutely amazing and the world is better with you in it! 🌟",
            "Your smile could light up the darkest room! 😊",
            "You have a heart of gold and everyone who knows you is lucky! 💛",
            "You're stronger than you think and braver than you believe! 💪",
            "Your kindness makes a real difference in people's lives! 🌈"
        ];

        let lastIndex = -1;

        function showCompliment() {
            const complimentElement = document.getElementById('compliment');

            // Pick a random compliment (different from the last one)
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * compliments.length);
            } while (randomIndex === lastIndex && compliments.length > 1);

            lastIndex = randomIndex;

            // Add animation
            complimentElement.classList.remove('sparkle');
            void complimentElement.offsetWidth; // Trigger reflow
            complimentElement.classList.add('sparkle');

            // Display the compliment
            complimentElement.textContent = compliments[randomIndex];
        }
    </script>
</body>
</html>
